[pytest]
# Makes the project root importable (config.py, ingestion/, validation/,
# db/, etc.) for a plain `pytest` invocation, matching what `python -m
# pytest` and `PYTHONPATH=. pytest` already did incidentally.
#
# Root cause this fixes: pytest's default "prepend" import mode adds,
# per test file, the first ancestor directory WITHOUT an __init__.py to
# sys.path - not necessarily the project root. Since tests/ has no
# __init__.py, pytest was inserting tests/ itself, not the directory one
# level up where config.py actually lives.
#
# `pythonpath` is a built-in pytest core option (pytest >= 7.0, no
# plugin required) - the officially documented mechanism for exactly
# this situation. This is the only change made; no test file, source
# file, or directory structure was touched.
pythonpath = .

# Lets a bare `pytest` (no path argument) reliably discover this
# project's tests from the root across environments, rather than
# depending on the invocation directory. Does not change which tests
# run when a specific path is already given, as in the reported
# invocation.
testpaths = tests
